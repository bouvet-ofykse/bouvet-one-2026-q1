<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
		<title>Bouvet One 2026 Q1</title>

		<link rel="stylesheet" href="dist/reset.css">
		<link rel="stylesheet" href="dist/reveal.css">
		<link rel="stylesheet" href="dist/theme/bouvet-one.css">

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="plugin/highlight/monokai.css">
	</head>
	<body>
		<div class="reveal">
			<div class="slides">

				<!-- FORSIDE -->
				<section class="frontpage">
					<div class="left-panel">
						<img src="images/bouvet-one-logo.png" class="frontpage-logo" alt="Bouvet One logo"/>
					</div>

					<div class="right-panel">
						<p class="occasion">BouvetOne 26.03.2026</p>

						<h1>
							Utvikler på NAIS:<br /> Mindre YAML, mer verdi?
						</h1>

						<p class="speaker">
							Rasmus Lyngaas<br />
							Olav Fykse
						</p>
					</div>
				</section>

				<!-- VANLIGE SLIDES -->
				<section>
					<h2>Første slide</h2>
					<p>Dette er innholdet ditt</p>
				</section>

			</div>
		</div>

		<script src="dist/reveal.js"></script>
		<script src="plugin/notes/notes.js"></script>
		<script src="plugin/markdown/markdown.js"></script>
		<script src="plugin/highlight/highlight.js"></script>
		<script>
			// More info about initialization & config:
			// - https://revealjs.com/initialization/
			// - https://revealjs.com/config/
			Reveal.initialize({
				hash: true,
				showHiddenSlides: true,

				slideNumber: 'c/t',

				// Learn about plugins: https://revealjs.com/plugins/
				plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
			});
		</script>
	</body>
</html>
